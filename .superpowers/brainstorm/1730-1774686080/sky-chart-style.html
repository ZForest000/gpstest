<h2>天空图视觉风格</h2>
<p class="subtitle">选择你喜欢的卫星天空图呈现方式</p>

<div class="cards">
  <!-- Option A: Dark Theme -->
  <div class="card" data-choice="dark" onclick="toggleSelect(this)">
    <div class="card-image" style="background: #1a1a2e; border-radius: 8px; padding: 20px; min-height: 280px; display: flex; align-items: center; justify-content: center;">
      <div style="position: relative; width: 240px; height: 240px;">
        <!-- Concentric circles -->
        <div style="position: absolute; inset: 0; border: 1.5px solid rgba(255,255,255,0.2); border-radius: 50%;"></div>
        <div style="position: absolute; inset: 30px; border: 1px dashed rgba(255,255,255,0.12); border-radius: 50%;"></div>
        <div style="position: absolute; inset: 60px; border: 1px dashed rgba(255,255,255,0.12); border-radius: 50%;"></div>
        <div style="position: absolute; inset: 90px; border: 1px dashed rgba(255,255,255,0.12); border-radius: 50%;"></div>
        <!-- Cross lines -->
        <div style="position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: rgba(255,255,255,0.08);"></div>
        <div style="position: absolute; left: 50%; top: 0; bottom: 0; width: 1px; background: rgba(255,255,255,0.08);"></div>
        <!-- Center dot -->
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 4px; height: 4px; background: rgba(255,255,255,0.4); border-radius: 50%;"></div>
        <!-- Satellites -->
        <div style="position: absolute; top: 25%; left: 35%; width: 12px; height: 12px; background: #4CAF50; border-radius: 50%; box-shadow: 0 0 6px #4CAF50;"></div>
        <div style="position: absolute; top: 55%; left: 20%; width: 12px; height: 12px; background: #4CAF50; border-radius: 50%; box-shadow: 0 0 6px #4CAF50;"></div>
        <div style="position: absolute; top: 40%; left: 65%; width: 10px; height: 10px; background: #FFC107; border-radius: 50%; box-shadow: 0 0 4px #FFC107;"></div>
        <div style="position: absolute; top: 70%; left: 60%; width: 10px; height: 10px; background: #FFC107; border-radius: 50%; box-shadow: 0 0 4px #FFC107;"></div>
        <div style="position: absolute; top: 15%; left: 70%; width: 8px; height: 8px; background: rgba(255,255,255,0.25); border-radius: 50%;"></div>
        <div style="position: absolute; top: 80%; left: 35%; width: 8px; height: 8px; background: rgba(255,255,255,0.25); border-radius: 50%;"></div>
        <!-- Labels -->
        <div style="position: absolute; top: -18px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.5); font-size: 11px;">N</div>
        <div style="position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.5); font-size: 11px;">S</div>
        <div style="position: absolute; left: -16px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.5); font-size: 11px;">W</div>
        <div style="position: absolute; right: -16px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.5); font-size: 11px;">E</div>
      </div>
    </div>
    <div class="card-body">
      <h3>A. 深色主题</h3>
      <p>深蓝/黑色背景，卫星带发光效果。信号强的卫星亮绿色，弱的黄色，未定位的灰色。模拟夜空观感，卫星点最突出。</p>
    </div>
  </div>

  <!-- Option B: Light Theme -->
  <div class="card" data-choice="light" onclick="toggleSelect(this)">
    <div class="card-image" style="background: #f5f5f5; border-radius: 8px; padding: 20px; min-height: 280px; display: flex; align-items: center; justify-content: center;">
      <div style="position: relative; width: 240px; height: 240px;">
        <!-- Concentric circles -->
        <div style="position: absolute; inset: 0; border: 1.5px solid rgba(0,0,0,0.2); border-radius: 50%;"></div>
        <div style="position: absolute; inset: 30px; border: 1px dashed rgba(0,0,0,0.1); border-radius: 50%;"></div>
        <div style="position: absolute; inset: 60px; border: 1px dashed rgba(0,0,0,0.1); border-radius: 50%;"></div>
        <div style="position: absolute; inset: 90px; border: 1px dashed rgba(0,0,0,0.1); border-radius: 50%;"></div>
        <!-- Cross lines -->
        <div style="position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: rgba(0,0,0,0.08);"></div>
        <div style="position: absolute; left: 50%; top: 0; bottom: 0; width: 1px; background: rgba(0,0,0,0.08);"></div>
        <!-- Center -->
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 4px; height: 4px; background: rgba(0,0,0,0.3); border-radius: 50%;"></div>
        <!-- Satellites with constellation colors -->
        <div style="position: absolute; top: 25%; left: 35%; width: 14px; height: 14px; background: #1976D2; border-radius: 50%; border: 2px solid #0D47A1;"></div>
        <div style="position: absolute; top: 55%; left: 20%; width: 14px; height: 14px; background: #FBC02D; border-radius: 50%; border: 2px solid #F57F17;"></div>
        <div style="position: absolute; top: 40%; left: 65%; width: 14px; height: 14px; background: #1976D2; border-radius: 50%; border: 2px solid #0D47A1;"></div>
        <div style="position: absolute; top: 70%; left: 60%; width: 14px; height: 14px; background: #D32F2F; border-radius: 50%; border: 2px solid #B71C1C;"></div>
        <div style="position: absolute; top: 15%; left: 70%; width: 12px; height: 12px; background: #bbb; border-radius: 50%; border: 1.5px solid #999;"></div>
        <div style="position: absolute; top: 80%; left: 35%; width: 12px; height: 12px; background: #bbb; border-radius: 50%; border: 1.5px solid #999;"></div>
        <!-- Labels -->
        <div style="position: absolute; top: -18px; left: 50%; transform: translateX(-50%); color: rgba(0,0,0,0.5); font-size: 11px; font-weight: 600;">N</div>
        <div style="position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%); color: rgba(0,0,0,0.5); font-size: 11px; font-weight: 600;">S</div>
        <div style="position: absolute; left: -16px; top: 50%; transform: translateY(-50%); color: rgba(0,0,0,0.5); font-size: 11px; font-weight: 600;">W</div>
        <div style="position: absolute; right: -16px; top: 50%; transform: translateY(-50%); color: rgba(0,0,0,0.5); font-size: 11px; font-weight: 600;">E</div>
      </div>
    </div>
    <div class="card-body">
      <h3>B. 浅色主题</h3>
      <p>浅灰背景，卫星按星座颜色区分（GPS蓝、北斗黄、GLONASS红等）。用颜色边框区分定位/未定位状态。清晰易读，适合日间使用。</p>
    </div>
  </div>

  <!-- Option C: Mixed -->
  <div class="card" data-choice="mixed" onclick="toggleSelect(this)">
    <div class="card-image" style="background: linear-gradient(180deg, #0d1b2a 0%, #1b2838 100%); border-radius: 8px; padding: 20px; min-height: 280px; display: flex; align-items: center; justify-content: center;">
      <div style="position: relative; width: 240px; height: 240px;">
        <!-- Concentric circles -->
        <div style="position: absolute; inset: 0; border: 1.5px solid rgba(100,180,255,0.25); border-radius: 50%;"></div>
        <div style="position: absolute; inset: 30px; border: 1px solid rgba(100,180,255,0.15); border-radius: 50%;"></div>
        <div style="position: absolute; inset: 60px; border: 1px solid rgba(100,180,255,0.15); border-radius: 50%;"></div>
        <div style="position: absolute; inset: 90px; border: 1px solid rgba(100,180,255,0.15); border-radius: 50%;"></div>
        <!-- Cross lines -->
        <div style="position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: rgba(100,180,255,0.1);"></div>
        <div style="position: absolute; left: 50%; top: 0; bottom: 0; width: 1px; background: rgba(100,180,255,0.1);"></div>
        <!-- Center -->
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 4px; height: 4px; background: rgba(100,180,255,0.4); border-radius: 50%;"></div>
        <!-- Satellites with constellation colors + glow -->
        <div style="position: absolute; top: 25%; left: 35%; width: 12px; height: 12px; background: #1976D2; border-radius: 50%; box-shadow: 0 0 8px rgba(25,118,210,0.6);"></div>
        <div style="position: absolute; top: 55%; left: 20%; width: 12px; height: 12px; background: #FBC02D; border-radius: 50%; box-shadow: 0 0 8px rgba(251,192,45,0.6);"></div>
        <div style="position: absolute; top: 40%; left: 65%; width: 12px; height: 12px; background: #1976D2; border-radius: 50%; box-shadow: 0 0 8px rgba(25,118,210,0.6);"></div>
        <div style="position: absolute; top: 70%; left: 60%; width: 12px; height: 12px; background: #D32F2F; border-radius: 50%; box-shadow: 0 0 8px rgba(211,47,47,0.6);"></div>
        <div style="position: absolute; top: 15%; left: 70%; width: 8px; height: 8px; background: rgba(100,180,255,0.25); border-radius: 50%;"></div>
        <div style="position: absolute; top: 80%; left: 35%; width: 8px; height: 8px; background: rgba(100,180,255,0.25); border-radius: 50%;"></div>
        <!-- Labels -->
        <div style="position: absolute; top: -18px; left: 50%; transform: translateX(-50%); color: rgba(100,180,255,0.6); font-size: 11px;">N</div>
        <div style="position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%); color: rgba(100,180,255,0.6); font-size: 11px;">S</div>
        <div style="position: absolute; left: -16px; top: 50%; transform: translateY(-50%); color: rgba(100,180,255,0.6); font-size: 11px;">W</div>
        <div style="position: absolute; right: -16px; top: 50%; transform: translateY(-50%); color: rgba(100,180,255,0.6); font-size: 11px;">E</div>
      </div>
    </div>
    <div class="card-body">
      <h3>C. 深色 + 星座颜色</h3>
      <p>深蓝背景 + 按星座颜色区分卫星。兼具深色背景的沉浸感和星座颜色的信息量。定位中的卫星带发光，未定位的半透明。</p>
    </div>
  </div>
</div>
